<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlterSelf AI | Identity Synthesis Nexus</title>
    <style>
        :root {
            --primary: #9333ea;
            --primary-glow: rgba(147, 51, 234, 0.5);
            --bg: #0b0118;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: white;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e0b36 0%, #0b0118 100%);
            z-index: -1;
        }

        .container {
            max-width: 1000px;
            padding: 80px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }

        .badge {
            background: rgba(147, 51, 234, 0.1);
            border: 1px solid rgba(147, 51, 234, 0.3);
            padding: 8px 24px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--primary);
            margin-bottom: 40px;
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-size: 80px;
            font-weight: 900;
            letter-spacing: -4px;
            margin: 0 0 40px 0;
            text-transform: uppercase;
            animation: slideUp 1s ease-out;
        }

        h1 span {
            color: var(--primary);
        }

        .description {
            font-size: 24px;
            line-height: 1.6;
            font-weight: 700;
            max-width: 800px;
            margin-bottom: 60px;
            white-space: pre-line;
            animation: fadeIn 1.5s ease-out;
        }

        .btn {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 25px 60px;
            border-radius: 50px;
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            box-shadow: 0 10px 30px var(--primary-glow);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 15px;
            animation: slideUp 2s ease-out;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px var(--primary-glow);
        }

        .footer {
            margin-top: 100px;
            opacity: 0.3;
            text-align: center;
            letter-spacing: 12px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            padding-bottom: 50px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .mouse-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle at center, rgba(147, 51, 234, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 50px; }
            .description { font-size: 18px; }
            .btn { padding: 20px 40px; font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <div class="mouse-glow" id="mouseGlow"></div>

    <div class="container">
        <div class="badge">The Identity Nexus</div>
        <h1>Alter<span>Self</span></h1>
        
        <div class="description">
            AlterSelf AI helps you turn your photos into amazing digital art.
            Advanced AI Technology
            to change your style to anything you want instantly.
        </div>

        <a href="app/login.tsx" class="btn" onclick="alert('System Stability Note: Since your local Expo server is down due to disk space, please clear space and run npm run web to access the full portal live!'); return false;">
            Forge Essence <span>⚡</span>
        </a>

        <div class="footer">
            AJ - Akarsh Jain<br>
            <span style="letter-spacing: 2px; font-weight: 500; font-size: 8px; margin-top: 10px; display: block;">Founding Neural Architect</span>
        </div>
    </div>

    <script>
        const glow = document.getElementById('mouseGlow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
