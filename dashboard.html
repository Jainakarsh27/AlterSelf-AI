<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlterSelf AI | Identity Dashboard</title>
    <style>
        :root {
            --primary: #9333ea;
            --bg: #0b0118;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: white;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }

        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 100% 0%, #1e0b36 0%, #0b0118 100%);
            z-index: -1;
        }

        .navbar {
            padding: 40px 24px 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .logo-box {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.4);
        }

        .nav-actions { display: flex; gap: 16px; }
        .action-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .content { padding: 24px; }

        .welcome { margin-bottom: 40px; }
        .welcome-sub {
            color: #666;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 2px;
        }
        .welcome-title {
            font-size: 36px;
            font-weight: 900;
            margin-top: 4px;
        }

        .stats-row {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 32px;
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            font-size: 20px;
        }

        .stat-label {
            color: #666;
            font-weight: 950;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-val-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 4px;
        }

        .stat-val { font-size: 28px; font-weight: 900; }
        .stat-trend { color: #10b981; font-weight: 700; font-size: 12px; }

        .chart-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        .chart-info { flex: 1; }
        .chart-mock {
            width: 120px;
            height: 120px;
            border: 10px solid rgba(147, 51, 234, 0.2);
            border-top: 10px solid var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .history-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .history-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 100px;
        }

        .history-item {
            aspect-ratio: 3/4;
            background: #111;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border);
        }

        .item-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
        }

        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(147, 51, 234, 0.5);
            font-size: 40px;
            color: white;
            text-decoration: none;
            border-top: 1px solid rgba(255,255,255,0.4);
            z-index: 100;
        }

        .footer {
            opacity: 0.2;
            text-align: center;
            letter-spacing: 10px;
            font-size: 9px;
            font-weight: 900;
            margin-bottom: 120px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            padding: 24px;
            display: flex;
            justify-content: space-around;
            border-top: 1px solid var(--border);
            font-size: 24px;
            z-index: 90;
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>

    <div class="navbar">
        <div class="logo">
            <div class="logo-box">📱</div>
            Nexus<span style="color: var(--primary)">DB</span>
        </div>
        <div class="nav-actions">
            <div class="action-circle">✨</div>
            <div class="action-circle">🔔</div>
        </div>
    </div>

    <div class="content">
        <div class="welcome">
            <div class="welcome-sub">Akarsh's Digital Nexus</div>
            <h2 class="welcome-title">Identity Dashboard</h2>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon" style="background: rgba(192, 38, 211, 0.2); color: #c026d3;">✨</div>
                <div class="stat-label">Synths</div>
                <div class="stat-val-row">
                    <div class="stat-val">42</div>
                    <div class="stat-trend">+12%</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: rgba(251, 191, 36, 0.2); color: #fbbf24;">⚡</div>
                <div class="stat-label">Credits</div>
                <div class="stat-val-row">
                    <div class="stat-val">1.2k</div>
                    <div class="stat-trend" style="color:#fbbf24">PRO</div>
                </div>
            </div>
        </div>

        <div class="chart-section">
            <div class="chart-info">
                <h3 style="margin:0; font-size:20px; font-weight:900;">Neural Affinity</h3>
                <p style="color:#666; font-size:10px; font-weight:700; text-transform:uppercase; margin-top:4px;">Style Distribution</p>
                <div style="display:flex; flex-direction:column; gap:8px; margin-top:16px;">
                    <div style="display:flex; align-items:center; font-size:10px; font-weight:700; color:#888;">
                        <div style="width:8px; height:8px; background:var(--primary); border-radius:50%; margin-right:8px;"></div> Anime
                    </div>
                    <div style="display:flex; align-items:center; font-size:10px; font-weight:700; color:#888;">
                        <div style="width:8px; height:8px; background:#3b82f6; border-radius:50%; margin-right:8px;"></div> Cyber
                    </div>
                </div>
            </div>
            <div class="chart-mock">
                <span style="font-size:24px; font-weight:900;">74%</span>
            </div>
        </div>

        <div class="history-title-row">
            <h3 style="margin:0; font-size:20px; font-weight:900;">Forge History</h3>
            <span style="color:var(--primary); font-size:10px; font-weight:950; text-transform:uppercase; letter-spacing:1px;">View All</span>
        </div>

        <div class="history-grid">
            <div class="history-item">
                <img src="https://images.unsplash.com/photo-1578632292335-df3abbb0d586?q=80&w=200&auto=format&fit=crop" style="width:100%; height:100%; object-fit:cover;">
                <div class="item-info">
                    <div style="font-weight:900; font-size:10px;">NEURAL ID #1041</div>
                    <div style="font-size:8px; color:#888; font-weight:700;">2h ago • Anime Style</div>
                </div>
            </div>
            <div class="history-item">
                <img src="https://images.unsplash.com/photo-1580417234674-3253715df6af?q=80&w=200&auto=format&fit=crop" style="width:100%; height:100%; object-fit:cover;">
                <div class="item-info">
                    <div style="font-weight:900; font-size:10px;">NEURAL ID #1042</div>
                    <div style="font-size:8px; color:#888; font-weight:700;">5h ago • Cyberpunk</div>
                </div>
            </div>
        </div>

        <div class="footer">AJ - Akarsh Jain</div>
    </div>

    <a href="upload.html" class="fab">➕</a>

    <div class="bottom-nav">
        <div style="color: var(--primary)">📱</div>
        <div style="opacity: 0.3">⏳</div>
        <div style="width: 40px"></div>
        <div style="opacity: 0.3">⚙️</div>
        <div style="opacity: 0.3">👤</div>
    </div>
</body>
</html>
