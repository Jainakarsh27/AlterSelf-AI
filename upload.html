<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlterSelf AI | Neural Synthesis</title>
    <style>
        :root {
            --primary: #9333ea;
            --bg: #0b0118;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: white;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 100%, #1e0b36 0%, #0b0118 100%);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 60px 24px;
            box-sizing: border-box;
            text-align: center;
        }

        .back-btn {
            position: absolute;
            top: 40px;
            left: 24px;
            width: 48px;
            height: 48px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-size: 20px;
        }

        h1 {
            font-size: 40px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-weight: 900;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        .upload-area {
            width: 100%;
            aspect-ratio: 1/1;
            background: var(--card);
            border: 2px dashed var(--border);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .upload-area:hover { border-color: var(--primary); }

        .upload-icon { font-size: 50px; margin-bottom: 16px; }
        .upload-text { font-weight: 800; font-size: 14px; color: #888; }

        .style-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 40px;
        }

        .style-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .style-item.active {
            background: rgba(147, 51, 234, 0.2);
            border-color: var(--primary);
            transform: scale(1.05);
        }

        .style-emoji { font-size: 24px; margin-bottom: 8px; }
        .style-name { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }

        .btn-forge {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 24px;
            border-radius: 24px;
            font-size: 20px;
            font-weight: 950;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            border-top: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 10px 30px rgba(147, 51, 234, 0.3);
            cursor: pointer;
            box-sizing: border-box;
        }

        /* LOADING OVERLAY */
        #loadingOverlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .scanner {
            width: 250px;
            height: 2px;
            background: var(--primary);
            box-shadow: 0 0 20px var(--primary);
            animation: scan 2s infinite ease-in-out;
        }

        @keyframes scan {
            0% { transform: translateY(-100px); }
            100% { transform: translateY(100px); }
        }

        /* SUCCESS VIEW */
        #successView {
            display: none;
            width: 100%;
        }

        .result-image {
            width: 100%;
            border-radius: 40px;
            border: 1px solid var(--border);
            margin-bottom: 32px;
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <a href="dashboard.html" class="back-btn">←</a>

    <div class="container" id="mainView">
        <h1 style="margin-top:20px;">Forge</h1>
        <div class="subtitle">Neural Architecture Selection</div>

        <input type="file" id="realFileInput" style="display:none;" onchange="previewFile(this)">
        <div class="upload-area" onclick="document.getElementById('realFileInput').click()">
            <div id="uploadContent">
                <div class="upload-icon">📸</div>
                <div class="upload-text">Select Identity Image</div>
                <div style="font-size:10px; color:#555; margin-top:8px;">CLICK TO ACTIVATE CAMERA/GALLERY</div>
            </div>
            <img id="previewImg" style="display:none; width:100%; height:100%; border-radius:38px; object-fit:cover;">
        </div>

        <div class="style-grid">
            <div class="style-item active" onclick="selectStyle(this)">
                <div class="style-emoji">🎎</div>
                <div class="style-name">Anime</div>
            </div>
            <div class="style-item" onclick="selectStyle(this)">
                <div class="style-emoji">🤖</div>
                <div class="style-name">Cyber</div>
            </div>
            <div class="style-item" onclick="selectStyle(this)">
                <div class="style-emoji">🎨</div>
                <div class="style-name">Vector</div>
            </div>
        </div>

        <button class="btn-forge" onclick="startSynthesis()">Begin Synthesis</button>
    </div>

    <!-- LOADING STEP -->
    <div id="loadingOverlay">
        <div style="font-size:60px; margin-bottom:40px;">🧬</div>
        <div class="scanner"></div>
        <div style="margin-top:40px; font-weight:900; letter-spacing:4px; color:var(--primary); font-size:12px;">NEURAL MAPPING IN PROGRESS...</div>
    </div>

    <!-- SUCCESS STEP -->
    <div class="container" id="successView">
        <h1>Synthesized</h1>
        <div class="subtitle">Neural ID #1094 Created</div>

        <img src="https://images.unsplash.com/photo-1578632292335-df3abbb0d586?q=80&w=400&auto=format&fit=crop" class="result-image">

        <button class="btn-forge" onclick="window.location='dashboard.html'" style="background:#111; color:white; border-color:var(--border)">Save to Nexus</button>
        <a href="upload.html" style="display:block; margin-top:24px; color:#666; font-weight:900; text-transform:uppercase; text-decoration:none; font-size:12px; letter-spacing:2px;">Discard Synth</a>
    </div>

    <script>
        function selectStyle(el) {
            document.querySelectorAll('.style-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        function previewFile(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('uploadContent').style.display = 'none';
                    const preview = document.getElementById('previewImg');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        }

        function startSynthesis() {
            const preview = document.getElementById('previewImg');
            if(!preview.src || preview.style.display === 'none') {
                alert("Please select an identity image first!");
                return;
            }
            document.getElementById('loadingOverlay').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('mainView').style.display = 'none';
                document.getElementById('successView').style.display = 'block';
            }, 3000);
        }
    </script>
</body>
</html>
