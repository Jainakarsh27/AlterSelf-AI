<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlterSelf AI | Create Protocol</title>
    <style>
        :root {
            --primary: #9333ea;
            --bg: #0b0118;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: white;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 100% 100%, #1e0b36 0%, #0b0118 100%);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 40px 24px;
            box-sizing: border-box;
        }

        .back-btn {
            width: 48px;
            height: 48px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-size: 20px;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 40px;
            font-weight: 900;
            margin: 0;
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .title-primary { color: var(--primary); margin-bottom: 32px; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .input-group {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px 20px;
            margin-bottom: 16px;
            position: relative;
        }

        .input-group.full { grid-column: span 2; }

        input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            font-size: 14px;
            font-weight: 700;
            outline: none;
        }

        .otp-row {
            display: flex;
            gap: 12px;
            grid-column: span 2;
        }

        .btn-otp {
            background: var(--card);
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 16px;
            padding: 0 20px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-register {
            background: var(--primary);
            color: white;
            width: 100%;
            padding: 22px;
            border-radius: 24px;
            font-size: 18px;
            font-weight: 950;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(147, 51, 234, 0.2);
            cursor: pointer;
            margin-top: 24px;
        }

        #errorMsg {
            color: #ef4444;
            font-size: 10px;
            font-weight: 800;
            margin-bottom: 16px;
            display: none;
            text-align: center;
            text-transform: uppercase;
        }

        .login-link {
            margin-top: 32px;
            text-align: center;
            color: #666;
            font-weight: 700;
            font-size: 12px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    
    <div class="container">
        <a href="login.html" class="back-btn">←</a>

        <h1>Create</h1>
        <h1 class="title-primary">Protocol</h1>

        <div id="errorMsg">All Neural Fields Required</div>

        <div class="form-grid">
            <div class="input-group">
                <input type="text" id="regName" placeholder="Name" required>
            </div>
            <div class="input-group">
                <input type="text" id="regSurname" placeholder="Surname" required>
            </div>
        </div>

        <div class="input-group full">
            <input type="email" id="regEmail" placeholder="Gmail ID" required>
        </div>

        <div class="input-group full">
            <input type="tel" id="regMobile" placeholder="Mobile Number" required>
        </div>

        <div class="otp-row">
            <div class="input-group" style="flex: 1; margin-bottom: 0;">
                <input type="text" id="regOtp" placeholder="OTP Code" required>
            </div>
            <button class="btn-otp" onclick="alert('System: Neutral Verification Code Sent to Gmail/Mobile')">Send OTP</button>
        </div>

        <div style="margin-top: 16px;"></div>

        <div class="input-group full">
            <input type="password" id="regPass" placeholder="Create Password" required>
        </div>

        <div class="input-group full">
            <input type="password" id="regPassConfirm" placeholder="Re-enter Password" required>
        </div>

        <button onclick="handleRegister()" class="btn-register">Register Protocol</button>

        <div class="login-link">
            Already have a protocol? <a href="login.html" style="color: var(--primary); text-decoration: none;">Access Portal</a>
        </div>
    </div>

    <script>
        function handleRegister() {
            const fields = ['regName', 'regSurname', 'regEmail', 'regMobile', 'regOtp', 'regPass', 'regPassConfirm'];
            const data = {};
            let hasEmpty = false;

            fields.forEach(f => {
                const val = document.getElementById(f).value.trim();
                if(!val) hasEmpty = true;
                data[f] = val;
            });

            const error = document.getElementById('errorMsg');

            if (hasEmpty) {
                error.innerText = "All Neural Fields Required";
                error.style.display = 'block';
                shake();
                return;
            }

            if (data.regPass !== data.regPassConfirm) {
                error.innerText = "Protocol Violation: Passwords Mismatch";
                error.style.display = 'block';
                shake();
                return;
            }

            error.style.display = 'none';
            localStorage.setItem('alterself_user', data.regName + ' ' + data.regSurname);
            alert('System: Identity Protocol Synchronized Successfully!');
            window.location.href = 'dashboard.html?user=' + encodeURIComponent(data.regName);
        }

        function shake() {
            const container = document.querySelector('.container');
            container.style.animation = 'none';
            setTimeout(() => { container.style.animation = 'shake 0.5s'; }, 10);
        }
    </script>
</body>
</html>
