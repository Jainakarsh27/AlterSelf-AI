<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlterSelf AI | Access Portal</title>
    <style>
        :root {
            --primary: #9333ea;
            --bg: #0b0118;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: white;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 0% 0%, #1e0b36 0%, #0b0118 100%);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 80px 24px;
            box-sizing: border-box;
        }

        .back-btn {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-size: 20px;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 60px;
            font-weight: 900;
            margin: 0;
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -3px;
        }

        .title-primary {
            color: var(--primary);
            margin-bottom: 60px;
        }

        .input-group {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            font-size: 18px;
            font-weight: 700;
            outline: none;
        }

        .forgot-pass {
            text-align: right;
            color: #666;
            font-weight: 900;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        .btn-main {
            background: var(--primary);
            color: white;
            width: 100%;
            padding: 22px;
            border-radius: 24px;
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(147, 51, 234, 0.3);
            cursor: pointer;
            transition: transform 0.2s;
            text-decoration: none;
            display: block;
            text-align: center;
            box-sizing: border-box;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 50px 0;
            opacity: 0.2;
        }

        .line { flex: 1; background: white; height: 1px; }
        .divider-text { margin: 0 20px; font-weight: 900; font-size: 10px; letter-spacing: 3px; color: #666; }

        .social-row {
            display: flex;
            gap: 16px;
        }

        .social-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            font-weight: 950;
            font-size: 12px;
            letter-spacing: 2px;
            text-decoration: none;
            color: white;
        }

        .register-link {
            margin-top: 60px;
            text-align: center;
            color: #888;
            font-weight: 700;
        }

        .register-link span {
            color: var(--primary);
            text-transform: uppercase;
            text-decoration: underline;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    
    <div class="container">
        <a href="index.html" class="back-btn">←</a>

        <h1>Access</h1>
        <h1 class="title-primary">Identity</h1>

        <div class="input-group">
            <input type="text" id="userName" placeholder="Full Name / Identity" required>
        </div>

        <div class="input-group">
            <input type="email" id="userEmail" placeholder="Email / Phone ID" required>
        </div>

        <div class="input-group">
            <input type="password" id="userPass" placeholder="Secure Password" required>
        </div>

        <div id="errorMsg" style="color: #ef4444; font-size: 10px; font-weight: 800; margin-bottom: 20px; display: none;">CRITICAL: All Identity Fields Required</div>

        <button onclick="syncAndRedirect()" class="btn-main">Sync Identity</button>

        <script>
            function syncAndRedirect() {
                const name = document.getElementById('userName').value.trim();
                const email = document.getElementById('userEmail').value.trim();
                const pass = document.getElementById('userPass').value.trim();
                const error = document.getElementById('errorMsg');

                if (!name || !email || !pass) {
                    error.style.display = 'block';
                    // Simple shake animation
                    document.querySelector('.container').style.animation = 'none';
                    setTimeout(() => { document.querySelector('.container').style.animation = 'shake 0.5s'; }, 10);
                    return;
                }

                error.style.display = 'none';
                localStorage.setItem('alterself_user', name);
                window.location.href = 'dashboard.html?user=' + encodeURIComponent(name);
            }
        </script>

        <div class="divider">
            <div class="line" style="height: 1px;"></div>
            <div class="divider-text">Secure Link</div>
            <div class="line" style="height: 1px;"></div>
        </div>

        <div class="social-row">
            <a href="dashboard.html" class="social-btn" onclick="this.innerText='SYNCING...'; setTimeout(()=>window.location='dashboard.html', 1500); return false;">GITHUB</a>
            <a href="dashboard.html" class="social-btn" onclick="this.innerText='SYNCING...'; setTimeout(()=>window.location='dashboard.html', 1500); return false;">GOOGLE</a>
        </div>

        <div class="register-link">
            New to AlterSelf? <a href="register.html" style="font-weight: 900; color: var(--primary); text-decoration: underline;">Create Protocol</a>
        </div>
    </div>
</body>
</html>
